      name: ingress_note_detail_id
      in: path
      required: true
      schema:
        type: integer
      example: 1001
    discharge_note_id:
      name: discharge_note_id
      in: path
      required: true
      schema:
        type: integer
      example: 200
    discharge_note_detail_id:
      name: discharge_note_detail_id
      in: path
      required: true
      schema:
        type: integer
      example: 2001

  responses:
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 404
            message: "Recurso no encontrado"
    BadRequest:
      description: Datos de entrada inválidos
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 400
            message: "Datos de entrada inválidos"
    UnprocessableEntity:
      description: Operación no permitida en el estado actual
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 422
            message: "Solo se pueden modificar notas en estado DRAFT"
    InternalServerError:
      description: Error interno del servidor
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 500
            message: "Error interno del servidor"

  schemas:
    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          example: 400
        message:
          type: string
          example: "Validation failed"
        errors:
          type: array
          nullable: true
          description: >
            Lista de errores de validación por campo.
            Presente en respuestas 400; null en errores 404, 422 y 500.
          items:
            $ref: "#/components/schemas/FieldError"

    FieldError:
      type: object
      properties:
        field:
          type: string
          description: Nombre del campo que falló la validación
          example: "description"
        rejected_value:
          nullable: true
          description: Valor enviado que fue rechazado (puede ser null)
          example: null
        message:
          type: string
          description: >
            Motivo del rechazo. Valores posibles según tipo de error:
            "must not be null" | "size must be between 0 and {max}" |
            "must be one of: {enum_values}" | "must be of type {type}"
          example: "must not be null"

    PageMetadata:
      type: object
      properties:
        page:
          type: integer
          example: 0
        size:
          type: integer
          example: 20
        total_elements:
          type: integer
          example: 45
        total_pages:
          type: integer
          example: 3
        first:
          type: boolean
          example: true
        last:
          type: boolean
          example: false

    NoteStatus:
      type: string
      enum: [DRAFT, CONFIRMED, CANCELLED]
      example: "DRAFT"

    NoteStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          $ref: "#/components/schemas/NoteStatus"

